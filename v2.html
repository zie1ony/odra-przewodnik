<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Odra Przewodnik — v2</title>
<style>
  :root{
    --bg:#0e1116; --panel:#171c24; --panel2:#1f2630; --ink:#e8edf4;
    --muted:#8c98a8; --accent:#4fd1c5; --accent2:#2dd4bf; --line:#262e3a;
    --warn:#f5a623;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);
    color:var(--ink);min-height:100%;display:flex;flex-direction:column;
  }
  a.back{position:fixed;top:10px;right:12px;font-size:11px;color:var(--muted);text-decoration:none;z-index:20}
  .top{padding:18px 18px 8px}
  .brand{font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:700}
  .brand span{color:var(--muted);letter-spacing:0;font-size:11px;display:block;margin-top:2px}

  .gpschip{
    display:inline-flex;align-items:center;gap:6px;margin-top:12px;
    background:var(--panel);border:1px solid var(--line);border-radius:20px;
    padding:6px 12px;font-size:11px;color:var(--muted);
  }
  .gpschip .pulse{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 var(--accent);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(79,209,197,.5)}70%{box-shadow:0 0 0 8px rgba(79,209,197,0)}100%{box-shadow:0 0 0 0 rgba(79,209,197,0)}}

  .row{display:flex;gap:8px;padding:12px 18px;align-items:center}
  .seg{display:flex;background:var(--panel);border-radius:10px;padding:3px;flex:1}
  .seg button{flex:1;border:none;background:transparent;color:var(--muted);
    padding:8px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
  .seg button.active{background:var(--accent);color:#04201d}

  .autopill{
    display:flex;align-items:center;gap:10px;margin:0 18px;padding:12px 14px;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
  }
  .autopill .txt{flex:1;font-size:13px;font-weight:600}
  .autopill .txt small{display:block;color:var(--muted);font-weight:400;font-size:11px;margin-top:2px}
  .switch{position:relative;width:46px;height:26px}
  .switch input{display:none}
  .slider{position:absolute;inset:0;background:#37404d;border-radius:20px;transition:.2s;cursor:pointer}
  .slider::before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  input:checked + .slider{background:var(--accent)}
  input:checked + .slider::before{transform:translateX(20px)}

  .list{flex:1;padding:14px 18px;display:flex;flex-direction:column;gap:1px;overflow:auto}
  .stage{
    display:flex;align-items:center;gap:14px;padding:16px 6px;cursor:pointer;
    border-bottom:1px solid var(--line);
  }
  .stage .num{font-size:12px;color:var(--muted);width:22px;font-variant-numeric:tabular-nums}
  .stage .body{flex:1;min-width:0}
  .stage .nm{font-size:16px;font-weight:600}
  .stage .ds{font-size:12px;color:var(--muted);margin-top:3px}
  .stage .st{font-size:18px;width:24px;text-align:center;color:var(--muted)}
  .stage.playing .nm{color:var(--accent)}
  .stage.playing .st{color:var(--accent)}
  .stage.queued .st{color:var(--warn)}
  .bars{display:inline-flex;gap:2px;align-items:flex-end;height:16px}
  .bars i{width:3px;background:var(--accent);animation:eq .9s ease-in-out infinite}
  .bars i:nth-child(2){animation-delay:.2s}.bars i:nth-child(3){animation-delay:.4s}
  @keyframes eq{0%,100%{height:5px}50%{height:16px}}

  .player{background:var(--panel2);border-top:1px solid var(--line);padding:16px 18px 20px}
  .player.hidden{display:none}
  .pnow{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .ptitle{font-size:18px;font-weight:700;margin-top:3px}
  .qinfo{font-size:11px;color:var(--warn);margin-top:4px;min-height:14px}
  .seek{display:flex;align-items:center;gap:10px;margin:14px 0}
  .seek input{flex:1;accent-color:var(--accent)}
  .t{font-size:11px;color:var(--muted);min-width:36px;font-variant-numeric:tabular-nums}
  .ctrls{display:flex;align-items:center;justify-content:center;gap:18px}
  .cbtn{background:none;border:none;color:var(--ink);font-size:22px;cursor:pointer}
  .cbtn.play{width:60px;height:60px;border-radius:50%;background:var(--accent);color:#04201d;font-size:24px;display:grid;place-items:center}
  .cbtn.small{font-size:18px;color:var(--muted)}
</style>
</head>
<body>
<a class="back" href="index.html">← wersje</a>
<div class="top">
  <div class="brand">Odra Przewodnik<span>v2 · ciemny / minimal</span></div>
  <div class="gpschip"><span class="pulse"></span><span id="gps">GPS: oczekiwanie…</span></div>
</div>

<div class="row"><div class="seg" id="langs"></div></div>

<div class="autopill">
  <div class="txt">Auto GPS<small id="autoStatus">tryb ręczny</small></div>
  <label class="switch"><input type="checkbox" id="autoToggle"><span class="slider"></span></label>
</div>

<div class="list" id="stages"></div>

<div class="player hidden" id="player">
  <div class="pnow">Teraz odtwarzane</div>
  <div class="ptitle" id="pName">—</div>
  <div class="qinfo" id="queueInfo"></div>
  <div class="seek">
    <span class="t" id="tCur">0:00</span>
    <input type="range" id="seek" min="0" max="100" value="0">
    <span class="t" id="tDur">0:00</span>
  </div>
  <div class="ctrls">
    <button class="cbtn small" id="stopBtn">⏹</button>
    <button class="cbtn play" id="playBtn">⏸</button>
    <button class="cbtn small" id="nextBtn">⏭</button>
  </div>
</div>

<audio id="audio"></audio>
<script src="config.js"></script>
<script src="guide.js"></script>
<script>
GUIDE.init({
  render(){
    const lr=document.getElementById('langs'); lr.innerHTML='';
    CONFIG.languages.forEach(l=>{
      const b=document.createElement('button');
      b.className=l.code===GUIDE.lang?'active':'';
      b.textContent=l.name; b.onclick=()=>GUIDE.setLang(l.code);
      lr.appendChild(b);
    });
    const sr=document.getElementById('stages'); sr.innerHTML='';
    CONFIG.stages.forEach((s,i)=>{
      const playing=GUIDE.currentStageId===s.id;
      const queued=GUIDE.queue.includes(s.id);
      const el=document.createElement('div');
      el.className='stage'+(playing?' playing':'')+(queued?' queued':'');
      let st = playing? '<span class="bars"><i></i><i></i><i></i></span>' : queued? '≡' : '▷';
      el.innerHTML=`<div class="num">${String(i+1).padStart(2,'0')}</div>
        <div class="body"><div class="nm">${s.description}</div>
        <div class="ds">${GUIDE.distanceText(s)}</div></div>
        <div class="st">${st}</div>`;
      el.onclick=()=>GUIDE.playManual(s.id);
      sr.appendChild(el);
    });
    document.getElementById('autoToggle').checked=GUIDE.autoMode;
    document.getElementById('autoStatus').textContent=GUIDE.autoMode?'śledzenie GPS aktywne':'tryb ręczny';
    const p=document.getElementById('player');
    if(GUIDE.currentStageId){
      p.classList.remove('hidden');
      document.getElementById('pName').textContent=GUIDE.currentStageName();
      document.getElementById('playBtn').textContent=GUIDE.paused?'▶':'⏸';
      document.getElementById('queueInfo').textContent=
        GUIDE.queue.length?('Kolejka: '+GUIDE.queue.map(id=>GUIDE.stageName(id)).join(' → ')):'';
    } else p.classList.add('hidden');
  },
  gps(t){ document.getElementById('gps').textContent='GPS: '+t; },
  time(cur,dur,pct){
    document.getElementById('tCur').textContent=cur;
    document.getElementById('tDur').textContent=dur;
    const s=document.getElementById('seek'); if(!s.dragging) s.value=pct;
  }
});
document.getElementById('autoToggle').onchange=e=>GUIDE.setAuto(e.target.checked);
document.getElementById('playBtn').onclick=()=>GUIDE.togglePlay();
document.getElementById('stopBtn').onclick=()=>GUIDE.stop();
document.getElementById('nextBtn').onclick=()=>GUIDE.next();
const seek=document.getElementById('seek');
seek.oninput=()=>seek.dragging=true;
seek.onchange=()=>{GUIDE.seekTo(seek.value);seek.dragging=false;};
</script>
</body>
</html>
