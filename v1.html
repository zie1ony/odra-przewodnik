<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Odra Przewodnik — v1</title>
<style>
  :root{
    --bg:#f4f6f8; --card:#ffffff; --ink:#1a2230; --muted:#6b7688;
    --accent:#1f7a8c; --accent-dark:#155563; --line:#e3e8ee;
    --ok:#2e9e5b; --warn:#d97706;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--ink);
    display:flex; flex-direction:column; min-height:100%;
  }
  header{
    background:var(--card); border-bottom:1px solid var(--line);
    padding:14px 16px; position:sticky; top:0; z-index:5;
  }
  .title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
  .title small{font-weight:500;color:var(--muted);font-size:12px}
  .langs{display:flex;gap:8px;margin-top:12px}
  .lang{
    flex:1;padding:9px;border:1px solid var(--line);background:#fff;
    border-radius:10px;font-size:14px;font-weight:600;color:var(--muted);
    cursor:pointer;transition:.15s;
  }
  .lang.active{background:var(--accent);border-color:var(--accent);color:#fff}

  .autobar{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:12px;padding:10px 12px;border-radius:10px;
    background:#eef4f5;border:1px solid var(--line);
  }
  .autobar .lbl{font-size:13px;font-weight:600}
  .autobar .lbl span{display:block;font-size:11px;color:var(--muted);font-weight:500}
  .switch{position:relative;width:50px;height:28px}
  .switch input{display:none}
  .slider{position:absolute;inset:0;background:#c4ccd6;border-radius:20px;transition:.2s;cursor:pointer}
  .slider::before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  input:checked + .slider{background:var(--ok)}
  input:checked + .slider::before{transform:translateX(22px)}

  main{flex:1;padding:16px;display:flex;flex-direction:column;gap:10px}
  .gps{font-size:11px;color:var(--muted);text-align:center}
  .gps b{color:var(--ink)}

  .stage{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;
    transition:.15s;
  }
  .stage.playing{border-color:var(--accent);box-shadow:0 0 0 2px rgba(31,122,140,.15)}
  .stage.queued{border-color:var(--warn);border-style:dashed}
  .stage .dot{
    width:40px;height:40px;border-radius:10px;flex-shrink:0;
    background:#eef4f5;color:var(--accent);display:grid;place-items:center;
    font-weight:700;font-size:15px;
  }
  .stage.playing .dot{background:var(--accent);color:#fff}
  .stage .info{flex:1;min-width:0}
  .stage .name{font-weight:600;font-size:15px}
  .stage .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .stage .tag{font-size:10px;text-transform:uppercase;letter-spacing:.5px;
    padding:2px 7px;border-radius:6px;background:#eef4f5;color:var(--accent);font-weight:700}
  .stage.queued .tag{background:#fef3e2;color:var(--warn)}

  /* player */
  .player{
    position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--line);
    padding:12px 16px 16px;box-shadow:0 -4px 20px rgba(0,0,0,.05);
  }
  .player.hidden{display:none}
  .pnow{font-size:13px;color:var(--muted)}
  .pnow b{color:var(--ink)}
  .seek{display:flex;align-items:center;gap:8px;margin:8px 0}
  .seek input[type=range]{flex:1;accent-color:var(--accent)}
  .t{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:38px}
  .controls{display:flex;gap:10px;justify-content:center}
  .btn{
    border:none;border-radius:10px;padding:10px 16px;font-size:15px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;gap:6px;
  }
  .btn.primary{background:var(--accent);color:#fff}
  .btn.ghost{background:#eef4f5;color:var(--accent)}
  .nav{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);margin-top:8px}
  a.back{position:fixed;top:10px;right:10px;font-size:11px;color:var(--muted);text-decoration:none;z-index:10}
</style>
</head>
<body>
<a class="back" href="index.html">← wersje</a>
<header>
  <div class="title">🎧 Odra Przewodnik <small>v1 · karty</small></div>
  <div class="langs" id="langs"></div>
  <div class="autobar">
    <div class="lbl">Automatyczne odtwarzanie GPS
      <span id="autoStatus">wyłączone — tryb ręczny</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="autoToggle">
      <span class="slider"></span>
    </label>
  </div>
</header>

<main>
  <div class="gps" id="gps">📍 Lokalizacja: <b>oczekiwanie…</b></div>
  <div id="stages"></div>
</main>

<div class="player hidden" id="player">
  <div class="pnow">Teraz: <b id="pName">—</b></div>
  <div class="seek">
    <span class="t" id="tCur">0:00</span>
    <input type="range" id="seek" min="0" max="100" value="0">
    <span class="t" id="tDur">0:00</span>
  </div>
  <div class="controls">
    <button class="btn ghost" id="stopBtn">⏹ Stop</button>
    <button class="btn primary" id="playBtn">⏸ Pauza</button>
    <button class="btn ghost" id="nextBtn">⏭ Następny</button>
  </div>
  <div class="nav"><span id="queueInfo"></span></div>
</div>

<audio id="audio"></audio>
<script src="config.js"></script>
<script src="guide.js"></script>
<script>
GUIDE.init({
  render(){
    // languages
    const lr=document.getElementById('langs'); lr.innerHTML='';
    CONFIG.languages.forEach(l=>{
      const b=document.createElement('button');
      b.className='lang'+(l.code===GUIDE.lang?' active':'');
      b.textContent=l.name;
      b.onclick=()=>GUIDE.setLang(l.code);
      lr.appendChild(b);
    });
    // stages
    const sr=document.getElementById('stages'); sr.innerHTML='';
    CONFIG.stages.forEach((s,i)=>{
      const el=document.createElement('div');
      const playing=GUIDE.currentStageId===s.id;
      const queued=GUIDE.queue.includes(s.id);
      el.className='stage'+(playing?' playing':'')+(queued?' queued':'');
      const dist=GUIDE.distanceText(s);
      el.innerHTML=`
        <div class="dot">${playing?'▶':i+1}</div>
        <div class="info">
          <div class="name">${s.description}</div>
          <div class="meta">${dist}</div>
        </div>
        ${playing?'<span class="tag">odtwarzane</span>':queued?'<span class="tag">w kolejce</span>':''}`;
      el.onclick=()=>GUIDE.playManual(s.id);
      sr.appendChild(el);
    });
    // auto bar
    document.getElementById('autoToggle').checked=GUIDE.autoMode;
    document.getElementById('autoStatus').textContent=
      GUIDE.autoMode?'włączone — śledzenie GPS':'wyłączone — tryb ręczny';
    // player
    const p=document.getElementById('player');
    if(GUIDE.currentStageId){
      p.classList.remove('hidden');
      document.getElementById('pName').textContent=GUIDE.currentStageName();
      document.getElementById('playBtn').textContent=GUIDE.paused?'▶ Graj':'⏸ Pauza';
      document.getElementById('queueInfo').textContent=
        GUIDE.queue.length?('W kolejce: '+GUIDE.queue.map(id=>GUIDE.stageName(id)).join(', ')):'';
    } else p.classList.add('hidden');
  },
  gps(text){ document.getElementById('gps').innerHTML='📍 Lokalizacja: <b>'+text+'</b>'; },
  time(cur,dur,pct){
    document.getElementById('tCur').textContent=cur;
    document.getElementById('tDur').textContent=dur;
    const s=document.getElementById('seek'); if(!s.dragging) s.value=pct;
  }
});
document.getElementById('autoToggle').onchange=e=>GUIDE.setAuto(e.target.checked);
document.getElementById('playBtn').onclick=()=>GUIDE.togglePlay();
document.getElementById('stopBtn').onclick=()=>GUIDE.stop();
document.getElementById('nextBtn').onclick=()=>GUIDE.next();
const seek=document.getElementById('seek');
seek.oninput=()=>{seek.dragging=true;};
seek.onchange=()=>{GUIDE.seekTo(seek.value);seek.dragging=false;};
</script>
</body>
</html>
